<div class="all-categories h-full flex flex-col gap-6 ">
    <app-page-header (add)="onAdd()" [title]="'All Categories'" [featureName]="'Add a new category'"></app-page-header>
    <div class="bg-white rounded-[20px] p-6 h-full ">
        <app-dynamic-table (edit)="onEdit($event)" (delete)="onDelete($event)" [data]="categories" [columns]="columns"></app-dynamic-table>
    </div>
</div>
