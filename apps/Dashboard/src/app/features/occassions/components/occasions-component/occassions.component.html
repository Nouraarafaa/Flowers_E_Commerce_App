<div class="w-full h-234.5 flex flex-col gap-4.5 p-3 rounded-2xl bg-white">
 <!-- header -->
  <app-page-header
    [title]="title()"
    [featureName]="featureName()"
    (add)="addNewOccasion()"
  ></app-page-header>

  <app-dynamic-table 
    [data]="occasions" 
    [columns]="columns" 
    (edit)="onEdit($event)" 
    (delete)="onDelete($event)">
  </app-dynamic-table>
</div>
