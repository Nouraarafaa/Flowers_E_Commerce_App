<section class="min-w-[1101px] h-[938px] flex flex-col gap-[18px] p-6 rounded-2xl bg-white">


    <div class="title flex justify-between">
        <h1>All Products</h1>
        <button>Add a new product</button>
    </div>


    <div class="table card">

        <p-table
        [value]="data"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [globalFilterFields]="globalFilterFields"
        >

            <!-- Header -->
            <ng-template pTemplate="header">
                <tr>
                <th *ngFor="let col of columns">
                    {{ col.header }}
                </th>
                </tr>
            </ng-template>

            <!-- Body -->
            <ng-template pTemplate="body" let-row>
                <tr>
                <td *ngFor="let col of columns">

                    <ng-container [ngSwitch]="col.type">

                    <span *ngSwitchCase="'text'">
                        {{ row[col.field] }}
                    </span>

                    <!-- <img *ngSwitchCase="'image'"[src]="row[col.field]" width="40" /> -->

                    <p-tag *ngSwitchCase="'tag'"
                            [value]="row[col.field]">
                    </p-tag>

                    <i *ngSwitchCase="'boolean'"
                        class="pi"
                        [ngClass]="{
                        'pi-check-circle text-green-500': row[col.field],
                        'pi-times-circle text-red-500': !row[col.field]
                        }">
                    </i>

                    <span *ngSwitchDefault>
                        {{ row[col.field] }}
                    </span>

                    </ng-container>

                </td>
                </tr>
            </ng-template>

        </p-table>
